name: Verify Required Specs

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-specs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify required spec files
        run: |
          REQUIRED_FILES=(
            "spec/Dashboard_Architecture_Specification.pdf"
            "spec/Framework_Timing_Architecture.pdf"
            "spec/Rebuild Prompt.pdf"
            "spec/Dashboard_Quality_Updated_Specifications.pdf"
            "spec/System_Sheet_Architecture_Specification.pdf"
            "spec/System Sheet Template and Formatting - Additional Formatting information_ (1).pdf"
            "spec/Current_Framework_Update_Log.pdf"
            "spec/v1.9_Daily_Framework_Review_Protocol.pdf"
            "spec/v1.9_Master_List_Framework_Specifications_Final_Governing_Edition.pdf"
          )

          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

